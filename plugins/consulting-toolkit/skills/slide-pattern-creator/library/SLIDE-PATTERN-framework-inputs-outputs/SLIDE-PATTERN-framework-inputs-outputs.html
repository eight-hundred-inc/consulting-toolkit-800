<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-framework-inputs-outputs</title>
<style>
body { background:#E8E8E8; display:flex; flex-direction:column; align-items:center; padding:40px 20px; font-family: sans-serif; margin:0; }
.slide-label { font-size:11px; color:#666; text-transform:uppercase; letter-spacing:0.08em; margin:0 0 6px; }
.slide { width:960px; height:540px; background:#FFFFFF; border:1px solid #CCCCCC; position:relative; overflow:hidden; margin-bottom:8px; }
.area-label { font-size:10px; color:#999999; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px; }
.pill { background:#F0F0F0; border:1px solid #CCC; padding:5px 8px; font-size:10px; color:#333; text-align:center; }
</style>
</head>
<body>

<p class="slide-label">[framework-inputs-outputs]</p>
<div class="slide" style="display:flex; flex-direction:column;">

  <div style="padding:14px 40px 12px; border-bottom:1px dashed #CCCCCC; flex-shrink:0; background:#FAFAFA;">
    <div class="area-label">Title Area — スライドマスター参照</div>
    <div style="font-size:16px; color:#CCCCCC; margin-top:4px;">フレームワーク全体像 ／ サブタイトル</div>
  </div>

  <div style="flex:1; display:flex; padding:20px 30px; gap:8px; align-items:stretch;">

    <!-- 左：Inputs -->
    <div style="width:16%; display:flex; flex-direction:column; gap:6px; justify-content:center;">
      <div class="area-label">Inputs</div>
      <div class="pill">インプット1</div>
      <div class="pill">インプット2</div>
      <div class="pill">インプット3</div>
      <div class="pill">インプット4</div>
    </div>

    <!-- 矢印 -->
    <div style="width:20px; display:flex; align-items:center; justify-content:center; color:#999; font-size:20px;">→</div>

    <!-- 中央：Framework Box -->
    <div style="flex:1; border:1px solid #999; display:flex; flex-direction:column;">
      <div style="background:#666; color:#fff; padding:4px 10px; font-size:11px; text-align:center;">フレームワーク名</div>
      <div style="padding:6px 8px; background:#F5F5F5; font-size:10px; color:#666; text-align:center; border-bottom:1px solid #EEE;">
        <span style="color:#999;">[共通データ層バナー]</span>
      </div>
      <div style="flex:1; display:flex; padding:8px; gap:6px;">
        <div style="flex:1; padding:8px; background:#F9F9F9; border:1px solid #DDD;">
          <div style="font-size:11px; font-weight:bold; color:#333; margin-bottom:4px;">コア機能1</div>
          <div style="font-size:10px; color:#666; line-height:1.4;">短い説明</div>
        </div>
        <div style="flex:1; padding:8px; background:#F9F9F9; border:1px solid #DDD;">
          <div style="font-size:11px; font-weight:bold; color:#333; margin-bottom:4px;">コア機能2</div>
          <div style="font-size:10px; color:#666; line-height:1.4;">短い説明</div>
        </div>
        <div style="flex:1; padding:8px; background:#F9F9F9; border:1px solid #DDD;">
          <div style="font-size:11px; font-weight:bold; color:#333; margin-bottom:4px;">コア機能3</div>
          <div style="font-size:10px; color:#666; line-height:1.4;">短い説明</div>
        </div>
      </div>
      <!-- Outputs slots -->
      <div style="display:flex; padding:0 8px 8px; gap:6px;">
        <div style="flex:1; padding:5px; background:#FAFAFA; border:1px dashed #CCC; font-size:9px; text-align:center; color:#666;">アウトプット1<br>随時</div>
        <div style="flex:1; padding:5px; background:#FAFAFA; border:1px dashed #CCC; font-size:9px; text-align:center; color:#666;">アウトプット2<br>半期</div>
        <div style="flex:1; padding:5px; background:#FAFAFA; border:1px dashed #CCC; font-size:9px; text-align:center; color:#666;">アウトプット3<br>四半期</div>
      </div>
    </div>

    <!-- 矢印 -->
    <div style="width:20px; display:flex; align-items:center; justify-content:center; color:#999; font-size:20px;">→</div>

    <!-- 右：Recipients -->
    <div style="width:16%; display:flex; flex-direction:column; gap:6px; justify-content:center;">
      <div class="area-label">Recipients</div>
      <div class="pill">受け手1</div>
      <div class="pill">受け手2</div>
      <div class="pill">受け手3</div>
    </div>

  </div>

</div>

</body>
</html>
