<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-case-study-visual</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #E8E8E8;
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
    color: #333333;
  }
  .stage { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 30px; }
  .slide { position: relative; width: 960px; height: 540px; background: #FFFFFF; display: flex; flex-direction: column; overflow: hidden; }
  .pattern-tag { position: absolute; top: 6px; right: 10px; font-size: 10px; color: #999999; letter-spacing: 0.06em; z-index: 5; }
  .title-area { flex-shrink: 0; height: 62px; background: #F0F0F0; border-bottom: 1px solid #CCCCCC; display: flex; align-items: center; padding: 0 24px; }
  .title-area-label { font-size: 11px; color: #999999; text-transform: uppercase; letter-spacing: 0.08em; }
  .content { flex: 1; min-height: 0; padding: 16px 24px 20px; display: flex; flex-direction: column; gap: 12px; }
  .area-label { font-size: 11px; color: #999999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }

  .lead { border: 1px dashed #CCCCCC; padding: 8px 12px; }
  .lead-text { font-size: 13px; color: #333333; }

  .cs { flex: 1; display: flex; gap: 18px; min-height: 0; }
  .cs-lead { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .tag { align-self: flex-start; border: 1px solid #CCCCCC; background: #F0F0F0; font-size: 10px; color: #333333; padding: 3px 9px; margin-bottom: 10px; }
  .cs-name { font-size: 19px; font-weight: bold; color: #333333; margin-bottom: 10px; }
  .cs-desc { font-size: 12px; color: #333333; line-height: 1.6; }
  .cs-visual { flex: 1; background: #F0F0F0; border: 1px solid #CCCCCC; display: flex; align-items: center; justify-content: center; min-height: 0; }
  .cs-visual .area-label { text-align: center; margin: 0; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide">
    <div class="pattern-tag">[case-study-visual]</div>
    <div class="title-area">
      <span class="title-area-label">Title Area — スライドマスター参照</span>
    </div>
    <div class="content">
      <div class="lead">
        <div class="area-label">Lead — 全幅の要約文（任意）</div>
        <div class="lead-text">この事例で伝えたい要点を1文で示す見出しが入ります。</div>
      </div>
      <div class="cs">
        <div class="cs-lead">
          <div class="area-label">事例リード</div>
          <div class="tag">企業属性ラベル（業種・規模）</div>
          <div class="cs-name">事例の見出しが入ります</div>
          <div class="cs-desc">支援内容の説明文が2〜3行で入ります。何をどのように支援し、どんな成果につながったかの要点をここに記述します。</div>
        </div>
        <div class="cs-visual">
          <span class="area-label">ビジュアル（スクショ／写真コラージュ）</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
