<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-logo-grid</title>
<style>
body { background:#E8E8E8; display:flex; flex-direction:column; align-items:center; padding:40px 20px; font-family: sans-serif; margin:0; }
.slide-label { font-size:11px; color:#666; text-transform:uppercase; letter-spacing:0.08em; margin:0 0 6px; }
.slide { width:960px; height:540px; background:#FFFFFF; border:1px solid #CCCCCC; position:relative; overflow:hidden; margin-bottom:8px; }
.area-label { font-size:10px; color:#999999; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px; }
.logo-cell { background:#F5F5F5; border:1px dashed #CCC; display:flex; align-items:center; justify-content:center; color:#999; font-size:10px; height:56px; }
</style>
</head>
<body>

<p class="slide-label">[logo-grid]</p>
<div class="slide" style="display:flex; flex-direction:column;">

  <div style="padding:14px 40px 12px; border-bottom:1px dashed #CCCCCC; flex-shrink:0; background:#FAFAFA;">
    <div class="area-label">Title Area — スライドマスター参照</div>
    <div style="font-size:16px; color:#CCCCCC; margin-top:4px;">お取引実績</div>
  </div>

  <div style="flex:1; padding:24px 40px; display:flex; flex-direction:column;">
    <div class="area-label">Logo Grid (6 × 5)</div>
    <div style="flex:1; display:grid; grid-template-columns:repeat(6, 1fr); grid-template-rows:repeat(5, 1fr); gap:14px 24px; padding-top:6px;">
      <div class="logo-cell">LOGO 1</div>
      <div class="logo-cell">LOGO 2</div>
      <div class="logo-cell">LOGO 3</div>
      <div class="logo-cell">LOGO 4</div>
      <div class="logo-cell">LOGO 5</div>
      <div class="logo-cell">LOGO 6</div>

      <div class="logo-cell">LOGO 7</div>
      <div class="logo-cell">LOGO 8</div>
      <div class="logo-cell">LOGO 9</div>
      <div class="logo-cell">LOGO 10</div>
      <div class="logo-cell">LOGO 11</div>
      <div class="logo-cell">LOGO 12</div>

      <div class="logo-cell">LOGO 13</div>
      <div class="logo-cell">LOGO 14</div>
      <div class="logo-cell">LOGO 15</div>
      <div class="logo-cell">LOGO 16</div>
      <div class="logo-cell">LOGO 17</div>
      <div class="logo-cell">LOGO 18</div>

      <div class="logo-cell">LOGO 19</div>
      <div class="logo-cell">LOGO 20</div>
      <div class="logo-cell">LOGO 21</div>
      <div class="logo-cell">LOGO 22</div>
      <div class="logo-cell">LOGO 23</div>
      <div class="logo-cell">LOGO 24</div>

      <div class="logo-cell">LOGO 25</div>
      <div class="logo-cell">LOGO 26</div>
      <div class="logo-cell">LOGO 27</div>
      <div class="logo-cell">LOGO 28</div>
      <div class="logo-cell">LOGO 29</div>
      <div class="logo-cell">LOGO 30</div>
    </div>
  </div>

</div>

</body>
</html>
