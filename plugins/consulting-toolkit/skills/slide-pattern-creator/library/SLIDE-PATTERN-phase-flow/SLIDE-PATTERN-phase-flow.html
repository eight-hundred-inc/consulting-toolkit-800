<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-phase-flow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #E8E8E8;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 44px;
  }
  .slide-wrap { position: relative; }
  .pattern-label {
    position: absolute;
    top: -22px;
    left: 0;
    font-size: 12px;
    color: #999999;
    letter-spacing: 0.05em;
  }
  .slide {
    width: 960px;
    height: 540px;
    background: #FFFFFF;
    border: 1px solid #CCCCCC;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .title-area {
    flex-shrink: 0;
    height: 66px;
    background: #F0F0F0;
    border-bottom: 1px solid #CCCCCC;
    display: flex;
    align-items: center;
    padding: 0 26px;
  }
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 26px;
    min-height: 0;
  }
  .area-label {
    font-size: 11px;
    color: #999999;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    display: block;
  }
  .phase-row { display: flex; gap: 12px; flex-shrink: 0; }
  .chevron {
    flex: 1;
    height: 54px;
    background: #F0F0F0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #333333;
    text-align: center;
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%, 18px 50%);
  }
  .chevron.first {
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%);
  }
  .task-row { display: flex; gap: 12px; flex: 1; min-height: 0; }
  .task-box {
    flex: 1;
    background: #FFFFFF;
    border: 1px solid #CCCCCC;
    padding: 12px 14px;
    font-size: 11.5px;
    color: #333333;
    line-height: 1.7;
  }
  .task-box .cap { color: #999999; font-size: 10px; letter-spacing: 0.05em; display: block; margin-bottom: 6px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="slide-wrap">
    <div class="pattern-label">[phase-flow]</div>
    <div class="slide">
      <div class="title-area">
        <span class="area-label">Title Area — スライドマスター参照</span>
      </div>
      <div class="content">
        <span class="area-label">Phase Row — 横方向のフェーズ（シェブロン／ボックス）</span>
        <div class="phase-row">
          <div class="chevron first">フェーズ1</div>
          <div class="chevron">フェーズ2</div>
          <div class="chevron">フェーズ3</div>
          <div class="chevron">フェーズ4</div>
        </div>
        <span class="area-label" style="margin-top:18px;">Tasks / Deliverables — 各フェーズ配下のタスク・成果物</span>
        <div class="task-row">
          <div class="task-box"><span class="cap">Tasks</span>・タスク項目<br>・タスク項目<br>・成果物</div>
          <div class="task-box"><span class="cap">Tasks</span>・タスク項目<br>・タスク項目<br>・成果物</div>
          <div class="task-box"><span class="cap">Tasks</span>・タスク項目<br>・タスク項目<br>・成果物</div>
          <div class="task-box"><span class="cap">Tasks</span>・タスク項目<br>・タスク項目<br>・成果物</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
